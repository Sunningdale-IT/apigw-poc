{{- if and .Values.apisix.enabled .Values.apisix.preconfigure.enabled }}
{{- $gbClientCert := .Values.kong.goodbehaviour.mtls.clientCert | default .Values.goodbehaviour.mtls.clientCert -}}
{{- $gbClientKey := .Values.kong.goodbehaviour.mtls.clientKey | default .Values.goodbehaviour.mtls.clientKey -}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: apisix-config-{{ .Release.Revision }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-apisix-admin
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nc -z {{ .Values.apisix.preconfigure.adminService }}.{{ .Release.Namespace }}.svc.cluster.local
              {{ .Values.apisix.preconfigure.adminPort }}; do sleep 3; done; sleep 5
      containers:
        - name: apisix-config
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              set -eu
              ADMIN_HOST="{{ .Values.apisix.preconfigure.adminService }}.{{ .Release.Namespace }}.svc.cluster.local"
              ADMIN="http://${ADMIN_HOST}:{{ .Values.apisix.preconfigure.adminPort }}"
              API_KEY="{{ .Values.apisix.preconfigure.adminKey }}"

              upsert_route() {
                ROUTE_ID="${1}"
                PAYLOAD="${2}"
                CODE="$(curl -sS -o /tmp/apisix-response.json -w "%{http_code}" \
                  -X PUT "${ADMIN}/apisix/admin/routes/${ROUTE_ID}" \
                  -H "X-API-KEY: ${API_KEY}" \
                  -H "Content-Type: application/json" \
                  -d "${PAYLOAD}")"
                if [ "${CODE}" -lt 200 ] || [ "${CODE}" -ge 300 ]; then
                  echo "Failed to configure route ${ROUTE_ID}, HTTP ${CODE}"
                  cat /tmp/apisix-response.json
                  exit 1
                fi
                echo "Configured route ${ROUTE_ID}"
              }

              DOG_PAYLOAD="$(cat <<'EOF'
              {
                "uri": "/dogcatcher/*",
                "plugins": {
                  "proxy-rewrite": {
                    "regex_uri": ["^/dogcatcher/(.*)", "/api/$1"]
                  }
                },
                "upstream": {
                  "type": "roundrobin",
                  "nodes": {
                    "dogcatcher.{{ .Release.Namespace }}.svc.cluster.local:5000": 1
                  }
                }
              }
              EOF
              )"
              upsert_route "{{ .Values.apisix.preconfigure.dogcatcherRouteId }}" "${DOG_PAYLOAD}"

              GOOD_BEHAVIOUR_PAYLOAD="$(cat <<'EOF'
              {
                "uri": "/good-behaviour/*",
                "plugins": {
                  "proxy-rewrite": {
                    "regex_uri": ["^/good-behaviour/(.*)", "/$1"]
                  }
                },
                "upstream": {
                  "scheme": "https",
                  "tls": {
                    "client_cert": {{ $gbClientCert | toJson }},
                    "client_key": {{ $gbClientKey | toJson }},
                    "verify": false
                  },
                  "type": "roundrobin",
                  "nodes": {
                    "goodbehaviour.{{ .Release.Namespace }}.svc.cluster.local:5443": 1
                  }
                }
              }
              EOF
              )"
              upsert_route "{{ .Values.apisix.preconfigure.goodBehaviourRouteId }}" "${GOOD_BEHAVIOUR_PAYLOAD}"
{{- end }}
