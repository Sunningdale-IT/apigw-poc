apiVersion: v1
kind: Secret
metadata:
  name: kong-secret
type: Opaque
stringData:
  postgres-password: {{ .Values.postgres.password | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kong-migrations
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) }} {{ .Values.postgres.port }}; do sleep 2; done
      containers:
      - name: kong-migrations
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - sh
          - -c
          - |
            # Run migrations. Kong 3.x emits a non-fatal "authentication exchange
            # unsuccessful" warning when it cannot retrieve pg server_version_num
            # (a PostgreSQL SCRAM-SHA-256 quirk). Treat that as a warning, not a
            # failure, so upgrades on an already-bootstrapped DB succeed.
            run() {
              OUT=$("$@" 2>&1); RC=$?
              echo "$OUT"
              if [ $RC -ne 0 ] && echo "$OUT" | grep -q "authentication exchange"; then
                echo "Warning: auth check failed (pg version probe) — treating as non-fatal"
                return 0
              fi
              return $RC
            }
            run kong migrations up || run kong migrations bootstrap --force
            run kong migrations finish || true
        env:
        - name: KONG_DATABASE
          value: {{ .Values.env.database | quote }}
        - name: KONG_PG_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: KONG_PG_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: KONG_PG_DATABASE
          value: {{ .Values.postgres.database | quote }}
        - name: KONG_PG_USER
          value: {{ .Values.postgres.username | quote }}
        - name: KONG_PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kong-secret
              key: postgres-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kong
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: kong
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: proxy
          containerPort: 8000
        - name: admin
          containerPort: 8001
        - name: manager
          containerPort: 8002
        env:
        - name: KONG_DATABASE
          value: {{ .Values.env.database | quote }}
        - name: KONG_PG_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: KONG_PG_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: KONG_PG_DATABASE
          value: {{ .Values.postgres.database | quote }}
        - name: KONG_PG_USER
          value: {{ .Values.postgres.username | quote }}
        - name: KONG_PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kong-secret
              key: postgres-password
        - name: KONG_ADMIN_LISTEN
          value: 0.0.0.0:8001
        - name: KONG_PROXY_LISTEN
          value: 0.0.0.0:8000
        - name: KONG_ADMIN_GUI_LISTEN
          value: 0.0.0.0:8002
        - name: KONG_ADMIN_GUI_URL
          value: {{ .Values.env.adminGuiUrl | quote }}
        - name: KONG_ADMIN_GUI_API_URL
          value: {{ .Values.env.adminApiUrl | quote }}
        - name: KONG_PLUGINS
          value: {{ .Values.env.plugins | quote }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
---
{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
spec:
  type: {{ .Values.proxy.service.type }}
  ports:
    - port: {{ .Values.proxy.service.port }}
      targetPort: proxy
      name: proxy
  selector:
    app.kubernetes.io/name: kong
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- end }}
{{- if .Values.admin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kong-admin
spec:
  type: {{ .Values.admin.service.type }}
  ports:
    - port: {{ .Values.admin.service.port }}
      targetPort: admin
      name: admin
  selector:
    app.kubernetes.io/name: kong
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- end }}
{{- if .Values.manager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kong-manager
spec:
  type: {{ .Values.manager.service.type }}
  ports:
    - port: {{ .Values.manager.service.port }}
      targetPort: manager
      name: manager
  selector:
    app.kubernetes.io/name: kong
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- end }}
{{- if and .Values.proxy.enabled .Values.proxy.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-proxy
  {{- with .Values.proxy.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.proxy.ingress.className }}
  {{- if and .Values.proxy.ingress.tls.enabled .Values.proxy.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ .Values.proxy.ingress.host }}
      secretName: {{ .Values.proxy.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.proxy.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-proxy
                port:
                  number: {{ .Values.proxy.service.port }}
---
{{- end }}
{{- if and .Values.admin.enabled .Values.admin.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-admin
  {{- with .Values.admin.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.admin.ingress.className }}
  {{- if and .Values.admin.ingress.tls.enabled .Values.admin.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ .Values.admin.ingress.host }}
      secretName: {{ .Values.admin.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.admin.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-admin
                port:
                  number: {{ .Values.admin.service.port }}
---
{{- end }}
{{- if and .Values.manager.enabled .Values.manager.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kong-manager
  {{- with .Values.manager.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.manager.ingress.className }}
  {{- if and .Values.manager.ingress.tls.enabled .Values.manager.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ .Values.manager.ingress.host }}
      secretName: {{ .Values.manager.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.manager.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-manager
                port:
                  number: {{ .Values.manager.service.port }}
---
{{- end }}
{{- if and .Values.admin.enabled (or .Values.dogcatcher.enabled .Values.goodbehaviour.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: kong-config-{{ .Release.Revision }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-kong
        image: busybox:1.36
        command: ["sh","-c","until nc -z kong-admin.{{ .Release.Namespace }}.svc.cluster.local 8001; do sleep 5; done; sleep 10"]
      containers:
      - name: kong-config
        image: curlimages/curl:8.5.0
        env:
        - name: DOGCATCHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: api-keys
        command:
        - sh
        - -c
        - |
          set -e
          ADMIN="http://kong-admin.{{ .Release.Namespace }}.svc.cluster.local:8001"
{{- if .Values.dogcatcher.enabled }}
          SVC="{{ .Values.dogcatcher.serviceName }}"
          URL="{{ .Values.dogcatcher.serviceUrl | default (printf "http://dogcatcher.%s.svc.cluster.local:5000/api" .Release.Namespace) }}"
          ROOT_SVC="${SVC}-root"
          ROOT_URL="${URL%/api}"
          INJECT_ROUTE="{{ .Values.dogcatcher.injectRouteName }}"
          INJECT_PATH="{{ .Values.dogcatcher.injectRoutePath }}"
          API_ROUTE="{{ .Values.dogcatcher.apiRouteName }}"
          API_PATH="{{ .Values.dogcatcher.apiRoutePath }}"
          STATIC_ROUTE="{{ .Values.dogcatcher.staticRouteName }}"
          STATIC_PATH="{{ .Values.dogcatcher.staticRoutePath }}"

          upsert_request_transformer() {
            ROUTE_NAME="${1}"
            if [[ -z "${DOGCATCHER_API_KEY}" ]]; then
              return 0
            fi
            PLUGIN_ID="$(curl -s "${ADMIN}/routes/${ROUTE_NAME}/plugins?name=request-transformer" \
              | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -n 1)"
            if [[ -n "${PLUGIN_ID}" ]]; then
              curl -s -X PUT "${ADMIN}/plugins/${PLUGIN_ID}" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"request-transformer\",\"config\":{\"add\":{\"headers\":[\"X-API-Key:${DOGCATCHER_API_KEY}\",\"X-Auth-Mode:inject\",\"X-Auth-Verified:true\"]}}}" > /dev/null || true
            else
              curl -s -X POST "${ADMIN}/routes/${ROUTE_NAME}/plugins" \
                -d "name=request-transformer" \
                -d "config.add.headers[]=X-API-Key:${DOGCATCHER_API_KEY}" \
                -d "config.add.headers[]=X-Auth-Mode:inject" \
                -d "config.add.headers[]=X-Auth-Verified:true" > /dev/null || true
            fi
          }

          # Ensure service exists, then always patch URL so upgrades can change upstream target.
          curl -s -X POST "${ADMIN}/services" -d "name=${SVC}" -d "url=${URL}" > /dev/null || true
          curl -s -X PATCH "${ADMIN}/services/${SVC}" -d "url=${URL}" > /dev/null || true
          curl -s -X POST "${ADMIN}/services/${SVC}/routes" -d "name=${INJECT_ROUTE}" -d "paths[]=${INJECT_PATH}" -d "strip_path=true" > /dev/null || true
          curl -s -X PATCH "${ADMIN}/routes/${INJECT_ROUTE}" -d "paths[]=${INJECT_PATH}" -d "strip_path=true" > /dev/null || true
          upsert_request_transformer "${INJECT_ROUTE}"

          # Configure direct /api and /static routes on a root service URL.
          curl -s -X POST "${ADMIN}/services" -d "name=${ROOT_SVC}" -d "url=${ROOT_URL}" > /dev/null || true
          curl -s -X PATCH "${ADMIN}/services/${ROOT_SVC}" -d "url=${ROOT_URL}" > /dev/null || true
          curl -s -X POST "${ADMIN}/services/${ROOT_SVC}/routes" -d "name=${API_ROUTE}" -d "paths[]=${API_PATH}" -d "strip_path=false" > /dev/null || true
          curl -s -X PATCH "${ADMIN}/routes/${API_ROUTE}" -d "paths[]=${API_PATH}" -d "strip_path=false" > /dev/null || true
          upsert_request_transformer "${API_ROUTE}"
          curl -s -X POST "${ADMIN}/services/${ROOT_SVC}/routes" -d "name=${STATIC_ROUTE}" -d "paths[]=${STATIC_PATH}" -d "strip_path=false" > /dev/null || true
          curl -s -X PATCH "${ADMIN}/routes/${STATIC_ROUTE}" -d "paths[]=${STATIC_PATH}" -d "strip_path=false" > /dev/null || true
          upsert_request_transformer "${STATIC_ROUTE}"
{{- end }}
{{- if .Values.goodbehaviour.enabled }}
          GBSVC="{{ .Values.goodbehaviour.mtls.serviceName }}"
          GBHOST="{{ .Values.goodbehaviour.mtls.upstreamHost | default (printf "goodbehaviour.%s.svc.cluster.local" .Release.Namespace) }}"
          GBPORT="{{ .Values.goodbehaviour.mtls.upstreamPort }}"
          GBPATH="{{ .Values.goodbehaviour.mtls.upstreamPath }}"
          curl -s -X POST "${ADMIN}/services" -d "name=${GBSVC}" -d "host=${GBHOST}" || true
{{- if .Values.goodbehaviour.mtls.enabled }}
          GB_CLIENT_CERT_B64="{{ .Values.goodbehaviour.mtls.clientCert | b64enc }}"
          GB_CLIENT_KEY_B64="{{ .Values.goodbehaviour.mtls.clientKey | b64enc }}"
          if [[ -z "${GB_CLIENT_CERT_B64}" ]] || [[ -z "${GB_CLIENT_KEY_B64}" ]]; then
            echo "goodbehaviour.mtls is enabled but clientCert/clientKey are missing"
            exit 1
          fi
          GB_CLIENT_CERT="$(printf '%s' "${GB_CLIENT_CERT_B64}" | base64 -d)"
          GB_CLIENT_KEY="$(printf '%s' "${GB_CLIENT_KEY_B64}" | base64 -d)"

          GB_CLIENT_CERT_ID="$(curl -s "${ADMIN}/certificates?tags={{ .Values.goodbehaviour.mtls.clientCertTag }}" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -n 1)"
          if [[ -z "${GB_CLIENT_CERT_ID}" ]]; then
            GB_CLIENT_CERT_ID="$(curl -s -X POST "${ADMIN}/certificates" \
              --data-urlencode "cert=${GB_CLIENT_CERT}" \
              --data-urlencode "key=${GB_CLIENT_KEY}" \
              --data-urlencode "tags[]={{ .Values.goodbehaviour.mtls.clientCertTag }}" \
              | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -n 1)"
          fi
          if [[ -z "${GB_CLIENT_CERT_ID}" ]]; then
            echo "Failed to create or find Kong client certificate for good-behaviour service"
            exit 1
          fi

{{- if .Values.goodbehaviour.mtls.tlsVerify }}
          GB_CA_CERT_B64="{{ .Values.goodbehaviour.mtls.caCert | b64enc }}"
          if [[ -z "${GB_CA_CERT_B64}" ]]; then
            echo "goodbehaviour.mtls.tlsVerify is enabled but caCert is missing"
            exit 1
          fi
          GB_CA_CHAIN="$(printf '%s' "${GB_CA_CERT_B64}" | base64 -d)"
          # Use the last cert in the bundle as the trust anchor (root CA).
          GB_CA_CERT="$(printf '%s\n' "${GB_CA_CHAIN}" | awk '
            /-----BEGIN CERTIFICATE-----/ { in_cert=1; cert=$0 ORS; next }
            in_cert { cert=cert $0 ORS }
            /-----END CERTIFICATE-----/ { in_cert=0; last=cert; cert="" }
            END { printf "%s", last }
          ')"

          GB_CA_CERT_ID="$(curl -s -X POST "${ADMIN}/ca_certificates" \
            --data-urlencode "cert=${GB_CA_CERT}" \
            | sed -n 's/.*"id":"\([^"]*\)".*/\1/p' | head -n 1)"
          if [[ -z "${GB_CA_CERT_ID}" ]]; then
            GB_CA_CERT_ID="$(curl -s "${ADMIN}/services/${GBSVC}" | sed -n 's/.*"ca_certificates":\["\([^"]*\)".*/\1/p' | head -n 1)"
          fi
          if [[ -z "${GB_CA_CERT_ID}" ]]; then
            echo "Failed to set Kong CA certificate for good-behaviour service"
            exit 1
          fi

          curl -s -X PATCH "${ADMIN}/services/${GBSVC}" \
            -d "protocol=https" \
            -d "host=${GBHOST}" \
            -d "port=${GBPORT}" \
            -d "path=${GBPATH}" \
            -d "tls_verify=true" \
            -d "client_certificate.id=${GB_CLIENT_CERT_ID}" \
            -d "ca_certificates[]=${GB_CA_CERT_ID}" || true
{{- else }}
          curl -s -X PATCH "${ADMIN}/services/${GBSVC}" \
            -d "protocol=https" \
            -d "host=${GBHOST}" \
            -d "port=${GBPORT}" \
            -d "path=${GBPATH}" \
            -d "tls_verify=false" \
            -d "client_certificate.id=${GB_CLIENT_CERT_ID}" || true
{{- end }}
{{- else }}
          curl -s -X PATCH "${ADMIN}/services/${GBSVC}" \
            -d "protocol=http" \
            -d "host=${GBHOST}" \
            -d "port=5000" \
            -d "path=${GBPATH}" || true
{{- end }}
          curl -s -X POST "${ADMIN}/services/${GBSVC}/routes" -d "name={{ .Values.goodbehaviour.mtls.routeName }}" -d "paths[]={{ .Values.goodbehaviour.mtls.routePath }}" -d "strip_path=true" || true
          curl -s -X PATCH "${ADMIN}/routes/{{ .Values.goodbehaviour.mtls.routeName }}" -d "paths[]={{ .Values.goodbehaviour.mtls.routePath }}" -d "strip_path=true" || true
{{- end }}
{{- end }}
