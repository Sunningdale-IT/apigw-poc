replicaCount: 1

image:
  repository: docker.io/jimleitch/kong-oidc
  pullPolicy: IfNotPresent
  tag: latest

admin:
  enabled: true
  service:
    type: ClusterIP
    port: 8001
  ingress:
    enabled: false
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    host: kong-admin.jim00.pd.test-rig.nl
    tls:
      enabled: true
      secretName: kong-admin-tls

manager:
  enabled: true
  service:
    type: ClusterIP
    port: 8002
  ingress:
    enabled: false
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    host: kong-manager.jim00.pd.test-rig.nl
    tls:
      enabled: true
      secretName: kong-manager-tls

proxy:
  enabled: true
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    host: kong.jim00.pd.test-rig.nl
    tls:
      enabled: true
      secretName: kong-proxy-tls

env:
  database: postgres
  plugins: bundled,oidc
  adminGuiUrl: https://kong-manager.jim00.pd.test-rig.nl
  adminApiUrl: https://kong-admin.jim00.pd.test-rig.nl

postgres:
  host: ""
  port: "5432"
  database: kong
  username: kong
  password: CHANGE_ME

dogcatcher:
  enabled: true
  serviceName: dogcatcher
  serviceUrl: ""
  injectRouteName: dogcatcher-route
  injectRoutePath: /dogcatcher
  apiRouteName: dogcatcher-api-route
  apiRoutePath: /api
  staticRouteName: dogcatcher-static-route
  staticRoutePath: /static

goodbehaviour:
  enabled: true
  mtls:
    enabled: false
    caCert: ""
    clientCert: ""
    clientKey: ""
    serviceName: good-behaviour
    routeName: good-behaviour
    routePath: /good-behaviour
    upstreamHost: good-behaviour.jim00.pd.test-rig.nl
    upstreamPort: 443
    upstreamPath: /api/citizens
    tlsVerify: true
    clientCertTag: kong-client-for-good-behaviour
    caCertTag: kong-ca-for-good-behaviour

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

imagePullSecrets: []
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
