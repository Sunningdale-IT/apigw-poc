apiVersion: v1
kind: Secret
metadata:
  name: certosaur-secret
type: Opaque
stringData:
  secret-key: {{ .Values.env.secretKey | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
---
{{- if .Values.persistence.data.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: certosaur-data
spec:
  accessModes:
    - {{ .Values.persistence.data.accessMode }}
  {{- if .Values.persistence.data.storageClass }}
  storageClassName: {{ .Values.persistence.data.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.data.size }}
---
{{- end }}
{{- if .Values.persistence.certs.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: certosaur-certs
spec:
  accessModes:
    - {{ .Values.persistence.certs.accessMode }}
  {{- if .Values.persistence.certs.storageClass }}
  storageClassName: {{ .Values.persistence.certs.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.certs.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: certosaur
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: certosaur
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: certosaur
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) }} {{ .Values.postgres.port }}; do sleep 2; done
      containers:
      - name: certosaur
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          name: http
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: certosaur-secret
              key: postgres-password
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: certosaur-secret
              key: secret-key
        - name: DJANGO_DEBUG
          value: {{ .Values.env.djangoDebug | quote }}
        - name: DJANGO_ALLOWED_HOSTS
          value: {{ .Values.env.allowedHosts | quote }}
        - name: DJANGO_CSRF_TRUSTED_ORIGINS
          value: {{ .Values.env.csrfTrustedOrigins | quote }}
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: certs
          mountPath: /app/certificates_storage
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: data
        {{- if .Values.persistence.data.enabled }}
        persistentVolumeClaim:
          claimName: certosaur-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: certs
        {{- if .Values.persistence.certs.enabled }}
        persistentVolumeClaim:
          claimName: certosaur-certs
        {{- else }}
        emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: certosaur
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: certosaur
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: certosaur
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: certosaur
                port:
                  number: {{ .Values.service.port }}
{{- end }}
