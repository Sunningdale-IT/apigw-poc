apiVersion: v1
kind: Secret
metadata:
  name: dogcatcher-secret
type: Opaque
stringData:
  secret-key: {{ .Values.env.secretKey | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  api-keys: {{ .Values.env.apiKeys | quote }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dogcatcher-uploads
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dogcatcher
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dogcatcher
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dogcatcher
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) }} {{ .Values.postgres.port }}; do sleep 2; done
      - name: run-migrations
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["python","manage.py","migrate","--noinput"]
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: postgres-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: secret-key
      - name: load-test-data
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["sh","-c","python manage.py populate_test_data --count {{ .Values.testData.count }} || true"]
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: postgres-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: secret-key
        volumeMounts:
        - name: uploads
          mountPath: /app/static/uploads
      containers:
      - name: dogcatcher
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          name: http
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: postgres-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: secret-key
        - name: DJANGO_DEBUG
          value: {{ .Values.env.djangoDebug | quote }}
        - name: ALLOWED_HOSTS
          value: {{ .Values.env.allowedHosts | quote }}
        - name: API_KEY_REQUIRED
          value: {{ .Values.env.apiKeyRequired | quote }}
        - name: API_KEYS
          valueFrom:
            secretKeyRef:
              name: dogcatcher-secret
              key: api-keys
        volumeMounts:
        - name: uploads
          mountPath: /app/static/uploads
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: uploads
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: dogcatcher-uploads
        {{- else }}
        emptyDir: {}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: dogcatcher
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: dogcatcher
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dogcatcher
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dogcatcher
                port:
                  number: {{ .Values.service.port }}
{{- end }}
