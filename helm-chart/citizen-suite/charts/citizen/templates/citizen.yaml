apiVersion: v1
kind: Secret
metadata:
  name: citizen-secret
type: Opaque
stringData:
  secret-key: {{ .Values.env.secretKey | quote }}
  api-key: {{ .Values.env.dogcatcherApiKey | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citizen
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: citizen
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: citizen
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: citizen
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          name: http
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: citizen-secret
              key: secret-key
        - name: DJANGO_DEBUG
          value: {{ .Values.env.djangoDebug | quote }}
        - name: ALLOWED_HOSTS
          value: {{ .Values.env.allowedHosts | quote }}
        - name: CSRF_TRUSTED_ORIGINS
          value: {{ .Values.env.csrfTrustedOrigins | quote }}
        - name: API_GATEWAY_URL
          value: {{ .Values.env.dogcatcherUrl | default "http://dogcatcher:5000/api" | quote }}
        - name: DOGCATCHER_PUBLIC_URL
          value: {{ .Values.env.dogcatcherPublicUrl | quote }}
        - name: GOOD_BEHAVIOUR_URL
          value: {{ .Values.env.goodBehaviourUrl | default "http://kong-proxy:8000/good-behaviour" | quote }}
        - name: DOGCATCHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: citizen-secret
              key: api-key
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: citizen
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: citizen
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: citizen
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: citizen
                port:
                  number: {{ .Values.service.port }}
{{- end }}
