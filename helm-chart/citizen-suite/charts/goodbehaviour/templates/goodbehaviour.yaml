apiVersion: v1
kind: Secret
metadata:
  name: goodbehaviour-secret
type: Opaque
stringData:
  secret-key: {{ .Values.env.secretKey | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
---
{{- if .Values.mtls.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: good-behaviour-mtls
type: Opaque
data:
  ca.crt: {{ .Values.mtls.caCert | b64enc | quote }}
  server.crt: {{ .Values.mtls.serverCert | b64enc | quote }}
  server.key: {{ .Values.mtls.serverKey | b64enc | quote }}
  client.crt: {{ .Values.mtls.clientCert | b64enc | quote }}
  client.key: {{ .Values.mtls.clientKey | b64enc | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: goodbehaviour
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: goodbehaviour
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goodbehaviour
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        command:
        - sh
        - -c
        - until nc -z {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) }} {{ .Values.postgres.port }}; do sleep 2; done
      - name: run-migrations
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["python","manage.py","migrate","--noinput"]
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: goodbehaviour-secret
              key: postgres-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: goodbehaviour-secret
              key: secret-key
      - name: load-test-data
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["sh","-c","python manage.py populate_records || true"]
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: goodbehaviour-secret
              key: postgres-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: goodbehaviour-secret
              key: secret-key
      containers:
      - name: goodbehaviour
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
          name: http
        {{- if .Values.mtls.enabled }}
        - containerPort: 5443
          name: https
        {{- end }}
        env:
        - name: POSTGRES_HOST
          value: {{ .Values.postgres.host | default (printf "postgres.%s.svc.cluster.local" .Release.Namespace) | quote }}
        - name: POSTGRES_PORT
          value: {{ .Values.postgres.port | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database | quote }}
        - name: POSTGRES_USER
          value: {{ .Values.postgres.username | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: goodbehaviour-secret
              key: postgres-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: goodbehaviour-secret
              key: secret-key
        - name: DJANGO_DEBUG
          value: {{ .Values.env.djangoDebug | quote }}
        - name: ALLOWED_HOSTS
          value: {{ .Values.env.allowedHosts | quote }}
        - name: CSRF_TRUSTED_ORIGINS
          value: {{ .Values.env.csrfTrustedOrigins | quote }}
        - name: CORS_ALLOW_ALL
          value: {{ .Values.env.corsAllowAll | quote }}
        {{- if .Values.mtls.enabled }}
        - name: MTLS_ENABLED
          value: "true"
        - name: MTLS_CERT_FILE
          value: /app/certs/server.crt
        - name: MTLS_KEY_FILE
          value: /app/certs/server.key
        - name: MTLS_CA_FILE
          value: /app/certs/ca.crt
        - name: MTLS_REQUIRED_CN
          value: {{ .Values.mtls.requiredClientCN | quote }}
        volumeMounts:
        - name: good-behaviour-mtls-certs
          mountPath: /app/certs
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- if .Values.mtls.enabled }}
      volumes:
      - name: good-behaviour-mtls-certs
        secret:
          secretName: good-behaviour-mtls
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: goodbehaviour
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
    {{- if .Values.mtls.enabled }}
    - port: 5443
      targetPort: https
      name: https
    {{- end }}
  selector:
    app.kubernetes.io/name: goodbehaviour
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.mtls.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: good-behaviour
spec:
  type: ClusterIP
  ports:
    - port: 5443
      targetPort: https
      name: https
  selector:
    app.kubernetes.io/name: goodbehaviour
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- end }}
{{- if and .Values.ingress.enabled .Values.mtls.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: goodbehaviour
spec:
  entryPoints:
    - websecure
  routes:
    {{- range .Values.ingress.hosts }}
    - match: HostSNI(`{{ .host }}`)
      services:
        - name: goodbehaviour
          port: 5443
    {{- end }}
  tls:
    passthrough: true
---
{{- else if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goodbehaviour
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: goodbehaviour
                port:
                  number: {{ if $.Values.mtls.enabled }}5443{{ else }}{{ $.Values.service.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
