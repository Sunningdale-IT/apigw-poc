{{- if and .Values.goodbehaviour.enabled .Values.goodbehaviour.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "apigw-demo.fullname" . }}-goodbehaviour
  labels:
    {{- include "apigw-demo.goodbehaviour.labels" . | nindent 4 }}
  {{- with .Values.goodbehaviour.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.goodbehaviour.ingress.className }}
  {{- if .Values.goodbehaviour.ingress.tls }}
  tls:
    {{- range .Values.goodbehaviour.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.goodbehaviour.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "apigw-demo.fullname" $ }}-goodbehaviour
                port:
                  number: {{ $.Values.goodbehaviour.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
