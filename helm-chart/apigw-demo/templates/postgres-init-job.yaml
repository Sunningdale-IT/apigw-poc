{{- if .Values.postgres.enabled }}
{{- $fullName := include "apigw-demo.fullname" . }}
{{- $ns := .Release.Namespace }}
# This Job runs before any app deployments on every install/upgrade.
# It ensures all database users and passwords are in sync with the current Helm values,
# which is necessary because the postgres PVC persists across reinstalls but the
# docker-entrypoint-initdb.d scripts only run on first initialisation.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullName }}-postgres-init-{{ .Release.Revision }}
  labels:
    {{- include "apigw-demo.postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app: {{ $fullName }}-postgres-init
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL..."
          until nc -z {{ $fullName }}-postgres.{{ $ns }}.svc.cluster.local 5432; do
            echo "Postgres not ready, retrying in 3s..."
            sleep 3
          done
          echo "Postgres is ready."
          sleep 3
      containers:
      - name: postgres-init
        image: postgres:16-alpine
        env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $fullName }}-postgres-secret
              key: password
        - name: PGHOST
          value: "{{ $fullName }}-postgres.{{ $ns }}.svc.cluster.local"
        - name: PGPORT
          value: "5432"
        - name: PGUSER
          value: {{ .Values.postgres.env.username | quote }}
        command:
        - sh
        - -c
        - |
          set -e
          echo "=== Syncing database users and passwords ==="

          sync_user() {
            USER="${1}"
            PASS="${2}"
            DB="${3}"
            echo "--- Syncing user: ${USER}"
            # Create user if not exists
            psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${USER}'" | grep -q 1 || \
              psql -c "CREATE USER ${USER};"
            # Always update password to match current values
            psql -c "ALTER USER ${USER} WITH PASSWORD '${PASS}';"
            # Create database if not exists
            psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB}'" | grep -q 1 || \
              psql -c "CREATE DATABASE ${DB} OWNER ${USER};"
            psql -c "GRANT ALL PRIVILEGES ON DATABASE ${DB} TO ${USER};"
          }

          sync_user "kong"          "{{ .Values.postgres.databases.kong.password }}"          "{{ .Values.postgres.databases.kong.name }}"
          sync_user "dogcatcher"    "{{ .Values.postgres.databases.dogcatcher.password }}"    "{{ .Values.postgres.databases.dogcatcher.name }}"
          {{- if .Values.keycloak.enabled }}
          sync_user "keycloak"      "{{ .Values.postgres.databases.keycloak.password }}"      "{{ .Values.postgres.databases.keycloak.name }}"
          {{- end }}
          {{- if .Values.certosaur.enabled }}
          sync_user "certosaur"     "{{ .Values.postgres.databases.certosaur.password }}"     "{{ .Values.postgres.databases.certosaur.name }}"
          {{- end }}
          {{- if .Values.moviezzz.enabled }}
          sync_user "moviezzz"      "{{ .Values.postgres.databases.moviezzz.password }}"      "{{ .Values.postgres.databases.moviezzz.name }}"
          {{- end }}
          {{- if .Values.freeparking.enabled }}
          sync_user "freeparking"   "{{ .Values.postgres.databases.freeparking.password }}"   "{{ .Values.postgres.databases.freeparking.name }}"
          {{- end }}
          {{- if .Values.goodbehaviour.enabled }}
          sync_user "goodbehaviour" "{{ .Values.postgres.databases.goodbehaviour.password }}" "{{ .Values.postgres.databases.goodbehaviour.name }}"
          {{- end }}
          {{- if .Values.parkruns.enabled }}
          sync_user "parkruns"      "{{ .Values.postgres.databases.parkruns.password }}"      "{{ .Values.postgres.databases.parkruns.name }}"
          {{- end }}

          echo "=== Database sync complete ==="
{{- end }}
