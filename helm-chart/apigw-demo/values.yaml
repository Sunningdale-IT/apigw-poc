# Kong API Gateway
kong:
  enabled: true
  replicaCount: 1
  
  image:
    repository: docker.io/jimleitch/kong-oidc
    pullPolicy: IfNotPresent
    tag: "latest"
  
  admin:
    enabled: true
    service:
      type: ClusterIP
      port: 8001
    ingress:
      enabled: false
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      host: kong-admin.jim00.pd.test-rig.nl
      tls:
        enabled: true
        secretName: kong-admin-tls
  
  manager:
    enabled: true
    service:
      type: ClusterIP
      port: 8002
    ingress:
      enabled: false
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      host: kong-manager.jim00.pd.test-rig.nl
      tls:
        enabled: true
        secretName: kong-manager-tls
  
  proxy:
    enabled: true
    service:
      type: ClusterIP
      port: 8000
    ingress:
      enabled: false
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      host: kong.jim00.pd.test-rig.nl
      tls:
        enabled: true
        secretName: kong-proxy-tls
  
  env:
    database: postgres
    plugins: "bundled,oidc"
    adminGuiUrl: "https://kong-manager.jim00.pd.test-rig.nl"
    adminApiUrl: "https://kong-admin.jim00.pd.test-rig.nl"

  # Dogcatcher routes configured automatically by the kong-config Job on install/upgrade
  dogcatcherConfig:
    # Service pointing to the dogcatcher app
    serviceName: "dogcatcher-inject"
    serviceUrl: ""  # Defaults to http://<release>-dogcatcher:<port>/api if empty
    # Route: citizen app calls Kong at this path (no API key needed from caller)
    injectRouteName: "inject-route"
    injectRoutePath: "/inject"
    # Additional routes so photo URLs returned by dogcatcher are also proxied
    apiRouteName: "dogcatcher-api-route"
    apiRoutePath: "/api"
    staticRouteName: "dogcatcher-static-route"
    staticRoutePath: "/static"

  # Good Behaviour mTLS routes configured automatically by the kong-config Job.
  # Only active when goodbehaviour.mtls.enabled=true.
  goodbehaviourConfig:
    # Kong service name for the good-behaviour backend
    serviceName: "good-behaviour"
    # Route path that the citizen app calls on Kong (plain HTTP)
    routeName: "good-behaviour-route"
    routePath: "/good-behaviour"
    # CN label used when registering the Kong client cert in Kong's certificate store
    clientCertTag: "kong-client-for-good-behaviour"
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

