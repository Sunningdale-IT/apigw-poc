# PostgreSQL Database Server (Unified)
postgres:
  enabled: true
  
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 5432
  
  persistence:
    enabled: true
    size: 20Gi  # Larger size to accommodate all databases
    storageClass: ""
    accessMode: ReadWriteOnce
    # Note: PVC has 'helm.sh/resource-policy: keep' annotation
    # Database data persists across helm uninstall/reinstall
    # To completely remove data: kubectl delete pvc postgres-data-apigw-demo-postgres-0
  
  env:
    database: postgres
    username: postgres
    password: "CHANGE_ME"  # Set via: --set postgres.env.password=<your-password>
  
