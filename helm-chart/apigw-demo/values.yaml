# Apache APISIX API Gateway (deployed as subchart)
# Uses official Apache APISIX Helm chart: https://github.com/apache/apisix-helm-chart
apisix:
  enabled: true
  
  # APISIX Gateway configuration
  gateway:
    type: NodePort
    
  # Admin API configuration
  admin:
    enabled: true
    type: ClusterIP
    # Admin API key - CHANGE THIS IN PRODUCTION
    # Set via: --set apisix.admin.credentials.admin='your-secure-key'
    credentials:
      admin: edd1c9f034335f136f87ad84b625c8f1  # Default admin key - CHANGE ME
      viewer: 4054f7cf07e344346cd3f287985e76a2  # Default viewer key - CHANGE ME
  
  # Enable Prometheus metrics
  serviceMonitor:
    enabled: false  # Set to true if you have Prometheus Operator
  
  # APISIX configuration
  apisix:
    # Set the timezone
    timezone: Europe/Amsterdam
    
    # Enable APISIX plugins
    plugins:
      - api-breaker
      - authz-keycloak
      - basic-auth
      - batch-requests
      - cors
      - echo
      - fault-injection
      - grpc-transcode
      - hmac-auth
      - http-logger
      - ip-restriction
      - jwt-auth
      - kafka-logger
      - key-auth
      - limit-conn
      - limit-count
      - limit-req
      - node-status
      - openid-connect
      - prometheus
      - proxy-cache
      - proxy-mirror
      - proxy-rewrite
      - redirect
      - referer-restriction
      - request-id
      - request-validation
      - response-rewrite
      - serverless-pre-function
      - serverless-post-function
      - sls-logger
      - syslog
      - tcp-logger
      - udp-logger
      - uri-blocker
      - wolf-rbac
      - zipkin
      - traffic-split
      - gzip
      - real-ip
    
    # Stream plugins for L4 proxy
    stream_plugins:
      - mqtt-proxy
      - ip-restriction
      - limit-conn
    
  # etcd configuration (APISIX's configuration storage)
  etcd:
    enabled: true
    replicaCount: 3
    
    # Use official etcd image instead of Bitnami
    image:
      repository: gcr.io/etcd-development/etcd
      tag: v3.5.17
      pullPolicy: IfNotPresent
    
    persistence:
      enabled: true
      size: 8Gi
      storageClass: ""  # Uses global.storageClass if empty
    
    auth:
      rbac:
        create: false  # Enable if you need RBAC for etcd
  
  # Ingress configuration for APISIX Gateway
  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: apisix.jim00.pd.test-rig.nl
        paths:
          - /
    tls:
      - secretName: apisix-gateway-tls
        hosts:
          - apisix.jim00.pd.test-rig.nl
  
  # APISIX Dashboard (Web UI) - deployed as separate subchart component
  dashboard:
    enabled: true
    
    config:
      conf:
        etcd:
          endpoints:
            - apisix-etcd:2379
        
        authentication:
          secret: secret  # CHANGE THIS IN PRODUCTION
          expire_time: 3600
          users:
            - username: admin
              password: admin  # CHANGE THIS IN PRODUCTION
    
    service:
      type: ClusterIP
    
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: apisix-dashboard.jim00.pd.test-rig.nl
          paths:
            - /
      tls:
        - secretName: apisix-dashboard-tls
          hosts:
            - apisix-dashboard.jim00.pd.test-rig.nl
  
  # Resources for APISIX pods
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  # Security context - APISIX needs write access to temp directories
  securityContext:
    runAsNonRoot: false  # APISIX image runs as root by default
    runAsUser: 0
  
  podSecurityContext:
    fsGroup: 0
