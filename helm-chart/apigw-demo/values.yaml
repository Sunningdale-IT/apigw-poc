# Dogcatcher API - Dog Registry Application
dogcatcher:
  enabled: true
  replicaCount: 1
  
  image:
    repository: docker.io/jimleitch/dogcatcher-api
    pullPolicy: IfNotPresent
    tag: "latest"
  
  service:
    type: ClusterIP
    port: 5000
    targetPort: 5000
  
  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod  # Adjust to your cert-manager issuer
    host: dogcatcher.jim00.pd.test-rig.nl
    tls:
      enabled: true
      secretName: dogcatcher-tls
  
  env:
    djangoDebug: "false"
    secretKey: "CHANGE_ME"  # Set via: --set dogcatcher.env.secretKey=<your-secret>
    allowedHosts: "dogcatcher.jim00.pd.test-rig.nl,dogcatcher,localhost,*"
    apiKeyRequired: "true"
    apiKeys: "d3OIet1iTuWt0Y8BczLcNPkuc7lxTpt5"  # Set via: --set dogcatcher.env.apiKeys=<your-api-key>
  
  testData:
    count: "15"  # Number of test dogs to populate on first deployment
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""  # Uses global.storageClass if empty
    accessMode: ReadWriteOnce

