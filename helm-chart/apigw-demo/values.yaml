# Good Behaviour API
goodbehaviour:
  enabled: true
  replicaCount: 1
  
  image:
    repository: docker.io/jimleitch/good-behaviour
    tag: latest
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 5000
    targetPort: 5000
  
  ingress:
    enabled: true
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: good-behaviour.jim00.pd.test-rig.nl
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: good-behaviour-tls
        hosts:
          - good-behaviour.jim00.pd.test-rig.nl
  
  env:
    djangoDebug: "false"
    secretKey: "CHANGE_ME"
    allowedHosts: "good-behaviour.jim00.pd.test-rig.nl,good-behaviour,localhost,*"
    csrfTrustedOrigins: "https://good-behaviour.jim00.pd.test-rig.nl"
    corsAllowAll: "true"

  # mTLS configuration for the good-behaviour service.
  # When enabled, the service listens on port 5443 (HTTPS + client cert required)
  # in addition to port 5000 (plain HTTP, health checks only).
  # Kong presents client.crt/client.key when calling the service on port 5443.
  # Set the PEM values via secrets.yaml or --set flags (never commit real certs here).
  mtls:
    enabled: false
    # CN that Kong's client certificate must present; leave empty to skip CN check.
    requiredClientCN: "kong-client"
    # PEM-encoded certificate material (set via secrets.yaml or --set).
    caCert: ""       # CA that signed both server and client certs
    serverCert: ""   # Server cert for good-behaviour (SAN: good-behaviour, good-behaviour.svc, etc.)
    serverKey: ""    # Private key for serverCert
    clientCert: ""   # Client cert for Kong to present (CN must match requiredClientCN)
    clientKey: ""    # Private key for clientCert

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  livenessProbe:
    enabled: true
    httpGet:
      path: /health/
      port: 5000
    initialDelaySeconds: 30
    periodSeconds: 10
  
  readinessProbe:
    enabled: true
    httpGet:
      path: /health/
      port: 5000
    initialDelaySeconds: 10
    periodSeconds: 5

