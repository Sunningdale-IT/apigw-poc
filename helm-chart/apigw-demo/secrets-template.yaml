# Sample Secrets Template
# Copy this file and fill in with real values
# 
# Usage:
#   1. Copy: cp secrets-template.yaml secrets.yaml
#   2. Generate passwords: openssl rand -base64 32
#   3. Fill in real values in secrets.yaml
#   4. Install: helm install apigw-demo . -f values.yaml -f secrets.yaml
#   5. IMPORTANT: Add secrets.yaml to .gitignore!
#
# This template is safe to commit to Git as it contains no real secrets.

postgres:
  env:
    password: ""  # PostgreSQL master password
  databases:
    kong:
      password: ""  # Kong database password
    dogcatcher:
      password: ""  # Dogcatcher database password
    keycloak:
      password: ""  # Keycloak database password
    certosaur:
      password: ""  # Certosaur database password
    moviezzz:
      password: ""  # Moviezzz database password
    freeparking:
      password: ""  # Free Parking database password
    goodbehaviour:
      password: ""  # Good Behaviour database password
    parkruns:
      password: ""  # Park Runs database password

dogcatcher:
  env:
    secretKey: ""  # Django secret key for Dogcatcher
    apiKeys: ""    # API key(s) required to access the Dogcatcher API (comma-separated for multiple)

citizen:
  env:
    secretKey: ""          # Django secret key for Model Citizen
    dogcatcherApiKey: ""   # Must match dogcatcher.env.apiKeys above
    # Good Behaviour routes through Kong; Kong uses mTLS to reach good-behaviour on port 5443.
    # Change only if your Helm release name differs from "apigw-demo".
    goodBehaviourUrl: "http://apigw-demo-kong-proxy:8000/good-behaviour"

certosaur:
  env:
    secretKey: ""  # Django secret key for Certosaur

moviezzz:
  env:
    secretKey: ""  # Django secret key for Moviezzz

freeparking:
  env:
    secretKey: ""  # Django secret key for Free Parking

goodbehaviour:
  env:
    secretKey: ""  # Django secret key for Good Behaviour
  # mTLS configuration — generate certs via Certosaur using the "government" intermediate CA.
  # See README.md "Connecting Good Behaviour via Kong with mTLS" for step-by-step instructions.
  mtls:
    enabled: false  # Set to true once certs are in place
    requiredClientCN: "kong-client"
    # Paste PEM content below (include the BEGIN/END lines).
    # The same CA signs both the server cert and the Kong client cert.
    caCert: |
      -----BEGIN CERTIFICATE-----
      <paste government intermediate CA cert here>
      -----END CERTIFICATE-----
    serverCert: |
      -----BEGIN CERTIFICATE-----
      <paste good-behaviour server cert here>
      -----END CERTIFICATE-----
    serverKey: |
      -----BEGIN RSA PRIVATE KEY-----
      <paste good-behaviour server key here>
      -----END RSA PRIVATE KEY-----
    clientCert: |
      -----BEGIN CERTIFICATE-----
      <paste kong-client cert here (CN=kong-client)>
      -----END CERTIFICATE-----
    clientKey: |
      -----BEGIN RSA PRIVATE KEY-----
      <paste kong-client key here>
      -----END RSA PRIVATE KEY-----

parkruns:
  env:
    secretKey: ""  # Django secret key for Park Runs

keycloak:
  env:
    adminPassword: ""  # Keycloak admin password
